name: Mastodon Now Mirror

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Optional commit SHA to mirror. Empty uses the latest commit on the selected branch.
        required: false
        type: string
      dry_run:
        description: Override dry-run mode for this manual run.
        required: false
        default: true
        type: boolean
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

jobs:
  mirror:
    name: Mirror new now-posts to Mastodon
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.run_attempt == 1
      )

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || format('refs/heads/{0}', github.event.repository.default_branch) }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Log effective mirror config
        env:
          EFFECTIVE_DRY_RUN: ${{ vars.MASTODON_DRY_RUN != '' && vars.MASTODON_DRY_RUN || (github.event_name == 'workflow_dispatch' && (inputs.dry_run && 'true' || 'false') || 'true') }}
          EFFECTIVE_TARGET_COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && (inputs.commit_sha != '' && inputs.commit_sha || github.sha) || github.event.workflow_run.head_sha }}
          EFFECTIVE_VISIBILITY: ${{ vars.MASTODON_VISIBILITY != '' && vars.MASTODON_VISIBILITY || 'public' }}
        run: |
          echo "Resolved config:"
          echo "- event_name=${GITHUB_EVENT_NAME}"
          echo "- dry_run=${EFFECTIVE_DRY_RUN}"
          echo "- target_commit_sha=${EFFECTIVE_TARGET_COMMIT_SHA}"
          echo "- visibility=${EFFECTIVE_VISIBILITY}"
          if [ -n "${GITHUB_STEP_SUMMARY}" ]; then
            {
              echo "## Mastodon mirror config"
              echo "- event_name: ${GITHUB_EVENT_NAME}"
              echo "- dry_run: ${EFFECTIVE_DRY_RUN}"
              echo "- target_commit_sha: ${EFFECTIVE_TARGET_COMMIT_SHA}"
              echo "- visibility: ${EFFECTIVE_VISIBILITY}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Mirror new DE now-posts to Mastodon
        env:
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}
          # Precedence:
          # 1) vars.MASTODON_DRY_RUN (global kill switch)
          # 2) workflow_dispatch input dry_run
          # 3) safe default true
          DRY_RUN: ${{ vars.MASTODON_DRY_RUN != '' && vars.MASTODON_DRY_RUN || (github.event_name == 'workflow_dispatch' && (inputs.dry_run && 'true' || 'false') || 'true') }}
          TARGET_COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && (inputs.commit_sha != '' && inputs.commit_sha || github.sha) || github.event.workflow_run.head_sha }}
        run: node scripts/mastodon-now-publisher.mjs